<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book & Notes Vault</title>
    <link rel="stylesheet" href="styles/site.css">
</head>
<body>

<!-- Skip Link -->
<a class="skip-link" href="#main-content">
    Skip to Main Content
</a>

<!-- HEADER -->
<header class="site-header">
    <div class="container">
        <a href="index.html" class="site-logo">
            <img class="logo_image" src="assets/images/logo.jpg" alt="Logo">
            <h1 class="logo-text">
                Joshua's Book & Notes Vault
            </h1>
        </a>

        <nav aria-label="Primary Navigation">
            <ul class="nav-links">
                <li><a href="index.html">About</a></li>                
                <li><a href="index.html#dashboard">Dashboard</a></li>
                <li><a href="records.html">Records</a></li>
                <li><a href="add_book.html">Add Book</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">🌓</button>
    </div>
</header>

<!-- MAIN -->
<main id="main-content">
    <!-- SETTINGS -->
    <section id="settings" class="section-card">
        <div class="container">
            <h2>Settings</h2>
            <div class="settings-grid">
                <article class="settings-card">
                    <h3>Reading Goal</h3>
                    <label for="page-goal">Target Pages</label>
                    <input type="number" id="page-goal" min="0">
                </article>

                <article class="settings-card">
                    <h3>Page Conversion</h3>
                    <label for="minutes-per-page">Minutes Per Page</label>
                    <input type="number" id="minutes-per-page" value="2" min="1">
                </article>

                <article class="settings-card">
                    <h3>Import JSON</h3>
                    <input type="file" id="import-file" accept=".json">
                </article>

                <article class="settings-card">
                    <h3>Export JSON</h3>
                    <button type="button" id="export-btn">Download JSON</button>
                </article>
            </div>
        </div>
    </section>
</main>
<footer class="site-footer">
    <div class="container">
        <p>Book & Notes Vault © 2026</p>
    </div>
</footer>

<script type="module" src="scripts/app.js"></script>
</body>
</html>
