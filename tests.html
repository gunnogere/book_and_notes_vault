<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit Tests - Book & Notes Vault</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; background: #f4f4f9; }
        h1 { color: #221f4d; border-bottom: 2px solid #221f4d; padding-bottom: 10px; }
        h2 { color: #5cb77a; margin-top: 30px; }
        .pass { color: #2e7d32; padding: 4px 0; }
        .fail { color: #c62828; font-weight: bold; background: #ffebee; padding: 4px 8px; border-radius: 4px; }
        .summary { margin-top: 40px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Add Book Form - Validation Tests</h1>
    <p><small><em>Note: This tests.html file was generated by AI after I described my project approach.</em></small></p>

    <div id="test-results"></div>
    <div class="summary" id="summary"></div>

    <script type="module">
        const resultsDiv = document.getElementById('test-results');
        let passed = 0;
        let total = 0;

        function assert(condition, message) {
            total++;

            const div = document.createElement('div');

            if (condition) {
                passed++;
                div.className = 'pass';
                div.textContent = `PASS: ${message}`;
            } else {
                div.className = 'fail';
                div.textContent = `FAIL: ${message}`;
            }

            resultsDiv.appendChild(div);
        }

        function describe(name, fn) {
            const header = document.createElement('h2');
            header.textContent = name;
            resultsDiv.appendChild(header);
            fn();
        }

        // Regex patterns defined in add_book.js
        const patterns = {
            text: /^\S(?:.*\S)?$/,
            numeric: /^(0|[1-9]\d*)(\.\d{1,2})?$/,
            date: /^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$/,
            tag: /^[A-Za-z-]+(?:,[A-Za-z-]+)*$/,
            duplicateCheck: /\b(\w+)\s+\1\b/i
        };

        describe('1. Text Validation (Title/Author)', () => {

            // Valid
            assert(patterns.text.test('Atomic Habits'),
                'Should accept normal strings');

            assert(patterns.text.test('A'),
                'Should accept single character');

            assert(patterns.text.test('Book 123'),
                'Should accept text containing numbers');

            assert(patterns.text.test('The Great Gatsby'),
                'Should accept multi-word titles');

            assert(patterns.text.test('Book  Name'),
                'Should allow double spaces internally');

            // Invalid
            assert(!patterns.text.test(' Leading Space'),
                'Should reject leading spaces');

            assert(!patterns.text.test('Trailing Space '),
                'Should reject trailing spaces');

            assert(!patterns.text.test(''),
                'Should reject empty string');

            assert(!patterns.text.test(' '),
                'Should reject single whitespace');

            assert(!patterns.text.test('     '),
                'Should reject multiple whitespace characters');

            assert(!patterns.text.test('\tBook'),
                'Should reject leading tab');

            assert(!patterns.text.test('Book\n'),
                'Should reject trailing newline');
        });

        describe('2. Duplicate Word Detection', () => {

            // Positive
            assert(patterns.duplicateCheck.test('The The'),
                'Should detect duplicate words');

            assert(patterns.duplicateCheck.test('habits habits'),
                'Should detect lowercase duplicate words');

            assert(patterns.duplicateCheck.test('The the'),
                'Should detect duplicates regardless of case');

            assert(patterns.duplicateCheck.test('book book'),
                'Should detect repeated words');

            // Negative
            assert(!patterns.duplicateCheck.test('Atomic Habits'),
                'Should pass distinct words');

            assert(!patterns.duplicateCheck.test('the quick the'),
                'Should not detect non-adjacent duplicates');

            assert(!patterns.duplicateCheck.test('there their'),
                'Should not match similar words');

            assert(!patterns.duplicateCheck.test('book-book'),
                'Should not match hyphenated words');

            assert(!patterns.duplicateCheck.test(''),
                'Should ignore empty strings');
        });

        describe('3. Numeric Validation (Pages)', () => {

            // Valid
            assert(patterns.numeric.test('0'),
                'Should accept zero');

            assert(patterns.numeric.test('320'),
                'Should accept valid page numbers');

            assert(patterns.numeric.test('999999'),
                'Should accept large integers');

            assert(patterns.numeric.test('1.5'),
                'Should accept one decimal place');

            assert(patterns.numeric.test('1.55'),
                'Should accept two decimal places');

            // Invalid
            assert(!patterns.numeric.test('-5'),
                'Should reject negative values');

            assert(!patterns.numeric.test('+5'),
                'Should reject plus sign');

            assert(!patterns.numeric.test('01'),
                'Should reject leading zero');

            assert(!patterns.numeric.test('001'),
                'Should reject multiple leading zeros');

            assert(!patterns.numeric.test('1.555'),
                'Should reject more than two decimal places');

            assert(!patterns.numeric.test('.5'),
                'Should reject missing integer portion');

            assert(!patterns.numeric.test('5.'),
                'Should reject missing decimal digits');

            assert(!patterns.numeric.test('1,000'),
                'Should reject comma-separated values');

            assert(!patterns.numeric.test('abc'),
                'Should reject non-numeric input');

            assert(!patterns.numeric.test(''),
                'Should reject empty string');
        });

        describe('4. Tag Validation (Comma-separated, no spaces)', () => {

            // Valid
            assert(patterns.tag.test('Self-Help'),
                'Should accept single tag');

            assert(patterns.tag.test('Self-Help,Fiction,Classic'),
                'Should accept multiple tags separated by commas');

            assert(patterns.tag.test('Sci-Fi'),
                'Should accept hyphenated tags');

            // Invalid
            assert(!patterns.tag.test('Self-Help, Fiction'),
                'Should reject spaces after commas');

            assert(!patterns.tag.test('Self Help'),
                'Should reject spaces within tags');

            assert(!patterns.tag.test(''),
                'Should reject empty string');

            assert(!patterns.tag.test('Fiction,'),
                'Should reject trailing comma');

            assert(!patterns.tag.test(',Fiction'),
                'Should reject leading comma');

            assert(!patterns.tag.test('Fiction,,Drama'),
                'Should reject double commas');

            assert(!patterns.tag.test('Sci-Fi2'),
                'Should reject numeric characters');

            assert(!patterns.tag.test('History!'),
                'Should reject special characters');

            // Current regex behavior
            assert(patterns.tag.test('-Tag'),
                'Current regex allows leading hyphen');

            assert(patterns.tag.test('Tag-'),
                'Current regex allows trailing hyphen');
        });

        describe('5. Date Validation (YYYY-MM-DD)', () => {

            // Valid
            assert(patterns.date.test('2026-06-18'),
                'Should accept valid ISO date format');

            assert(patterns.date.test('0001-01-01'),
                'Should accept minimum formatted date');

            assert(patterns.date.test('9999-12-31'),
                'Should accept maximum formatted date');

            // Invalid month
            assert(!patterns.date.test('2026-00-01'),
                'Should reject invalid month (00)');

            assert(!patterns.date.test('2026-13-01'),
                'Should reject invalid month (13)');

            // Invalid day
            assert(!patterns.date.test('2026-01-00'),
                'Should reject invalid day (00)');

            assert(!patterns.date.test('2026-01-32'),
                'Should reject invalid day (32)');

            // Invalid formatting
            assert(!patterns.date.test('18/06/2026'),
                'Should reject slash-separated date');

            assert(!patterns.date.test('2026/06/18'),
                'Should reject slash separators');

            assert(!patterns.date.test('26-06-18'),
                'Should reject short year');

            // Known regex limitations
            assert(patterns.date.test('2026-02-31'),
                'Known limitation: regex accepts February 31');

            assert(patterns.date.test('2025-04-31'),
                'Known limitation: regex accepts April 31');

            assert(patterns.date.test('2023-02-29'),
                'Known limitation: regex accepts invalid leap day');
        });

        describe('6. Pattern Integrity Checks', () => {

            assert(patterns.text instanceof RegExp,
                'text should be a RegExp');

            assert(patterns.numeric instanceof RegExp,
                'numeric should be a RegExp');

            assert(patterns.date instanceof RegExp,
                'date should be a RegExp');

            assert(patterns.tag instanceof RegExp,
                'tag should be a RegExp');

            assert(patterns.duplicateCheck instanceof RegExp,
                'duplicateCheck should be a RegExp');
        });

        const summary = document.getElementById('summary');

        summary.innerHTML = `
            <strong>Final Results:</strong>
            ${passed} / ${total} tests passed.
        `;

        if (passed === total) {
            summary.style.borderLeft = '5px solid #2e7d32';
        } else {
            summary.style.borderLeft = '5px solid #c62828';
        }
    </script>
</body>
</html>
