<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book & Notes Vault</title>
    <link rel="stylesheet" href="styles/site.css">
</head>
<body>
<a class="skip-link" href="#main-page-content-area">
    Skip to Main Content
</a>
  
<header class="site-header">
    <div class="container">
        <a href="index.html" class="site-logo">
            <img class="logo_image" src="assets/images/logo.jpg" alt="Logo">
            <h1 class="logo-text">
                Joshua's Book & Notes Vault
            </h1>
        </a>

        <nav aria-label="Primary Navigation">
            <ul class="nav-links">
                <li><a href="index.html">About</a></li>                
                <li><a href="index.html#dashboard">Dashboard</a></li>
                <li><a href="records.html">Records</a></li>
                <li><a href="add_book.html">Add Book</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">🌓</button>

    </div>
</header>
 
<main id="main-page-content-area">  
    <section id="book-form-section" class="section-card">
        <div class="container"> 
            <div id="message-container" aria-live="polite"></div>

            <!-- Tabs -->
            <div class="tabs-nav" style="display: flex; gap: 10px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                <button type="button" class="tab-btn active" data-tab="single" style="background: none; border: none; padding: 10px 20px; cursor: pointer; border-bottom: 2px solid var(--primary); font-weight: bold; color: var(--text);">Enter SIngle Record</button>
                <button type="button" class="tab-btn" data-tab="bulk" style="background: none; border: none; padding: 10px 20px; cursor: pointer; color: var(--muted);">Bulk Upload / Update</button>
            </div>

            <!-- manual entry for one-by-one -->
            <div id="single-pane" class="tab-pane">
                <h2>Add Book</h2>
                <form id="book-form" novalidate>
                    <input type="hidden" id="record-id">
                    
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" required>
                        <small class="error-message" id="title-error"></small>
                    </div>

                    <div class="form-group">
                        <label for="author">Author</label>
                        <input type="text" id="author" required>
                        <small class="error-message" id="author-error"></small>
                    </div>

                    <div class="form-group">
                        <label for="pages">Pages</label>
                        <input type="number" id="pages" min="1" required>
                        <small class="error-message" id="pages-error"></small>
                    </div>

                    <div class="form-group">
                        <label for="tag">Tag</label>
                        <input type="text" id="tag" required>
                        <small class="error-message" id="tag-error"></small>
                    </div>

                    <div class="form-group">
                        <label for="date-added">Date Added</label>
                        <input type="date" id="date-added" required>
                        <small class="error-message" id="date-error"></small>
                    </div>

                    <button type="submit" id="save-btn">
                        Save Book
                    </button>
                </form>
            </div>

            <!-- bulk upload from json file-->
            <div id="bulk-pane" class="tab-pane" style="display: none;">
                <div class="import-section" style="border: 2px solid var(--border); padding: 30px; border-radius: 8px; background: var(--card-bg);">
                    <h3>Bulk Management</h3>
                    <p style="margin-bottom: 20px; color: var(--muted);">Upload a JSON file containing multiple book records to add or update your library in bulk.</p>
                    <div style="display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;">
                        <div class="form-group" style="flex: 1; min-width: 250px; margin-bottom: 0;">
                            <label for="import-json">Upload Records File (.json)</label>
                            <input type="file" id="import-json" accept=".json" style="width: 100%;">
                        </div>
                        <button type="button" id="bulk-process-btn" class="btn" style="height: 44px; padding: 0 24px;">Process File</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
  
<footer class="site-footer">
    <div class="container">
        <p>Book & Notes Vault © 2026</p>
    </div>
</footer>

<script type="module" src="scripts/app.js"></script>
<script type="module" src="scripts/add_book.js"></script> 
</body>
</html>
